name: Secure Python CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run tests
      - name: Run tests
        run: pytest tests/ -v

      # Step 5: Use secrets securely — never hardcode!
      - name: Use secure environment variables
        env:
          API_KEY: ${{ secrets.MY_API_KEY }}
          DB_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "✅ Secrets loaded from GitHub Secrets Vault"
          python app.py --check-env
